<!doctype html>
<html lang="bn">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vencon Redirecting…</title>
    <meta name="robots" content="noindex" />
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f7fb;
        --fg: #111827;
        --muted: #6b7280;
        --line: #d7dbea;
        --accent: #0f766e;
        --accent-soft: #ccfbf1;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top left, rgba(15,118,110,.08), transparent 30%),
          linear-gradient(180deg, #ffffff, var(--bg));
        color: var(--fg);
        font-family: "Hind Siliguri", system-ui, sans-serif;
      }
      .card {
        width: min(92vw, 640px);
        padding: 40px 28px;
        border: 1px solid var(--line);
        border-radius: 28px;
        background: rgba(255,255,255,.92);
        box-shadow: 0 20px 60px rgba(17,24,39,.08);
        text-align: center;
      }
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 18px;
        padding: 10px 14px;
        border-radius: 999px;
        background: var(--accent-soft);
        color: var(--accent);
        font-weight: 700;
        letter-spacing: .04em;
      }
      h1 { margin: 0 0 10px; font-size: clamp(28px, 4vw, 40px); }
      p { margin: 0; color: var(--muted); font-size: 16px; line-height: 1.7; }
      .spinner {
        width: 42px;
        height: 42px;
        margin: 24px auto 0;
        border-radius: 50%;
        border: 3px solid rgba(15,118,110,.18);
        border-top-color: var(--accent);
        animation: spin .8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  </head>
  <body>
    <main class="card">
      <div class="badge">VENCON · Redirecting</div>
      <h1>পেইজ লোড হচ্ছে…</h1>
      <p>আপনার লিংকটি সঠিক হলে সিস্টেম এখনই সেই পেইজে নিয়ে যাবে।</p>
      <div class="spinner" aria-hidden="true"></div>
    </main>
    <script>
      (function () {
        var target = window.location.pathname + window.location.search + window.location.hash;
        try {
          sessionStorage.setItem('vencon_spa_redirect', target);
        } catch (e) {}
        window.location.replace('/');
      })();
    </script>
  </body>
</html>
